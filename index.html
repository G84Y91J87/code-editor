<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Code Editor (HTML/CSS/JS)</title>

<style>
html, body {
    height: 100%;
    margin: 0;
    font-family: Arial, sans-serif;
}

/* ===== MENUBAR ===== */
#menubar {
    height: 50px;
    background: linear-gradient(90deg, #3f5f4f, #2f3f38);
    display: flex;
    align-items: center;
    padding: 0 12px;
    box-sizing: border-box;
    color: #f2f5f3;
    border-bottom: 2px solid #1f2a25;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
}

#left {
    display: flex;
    align-items: center;
    gap: 10px;
}

#logo {
    height: 32px;
}

#title {
    font-size: 14px;
    font-weight: 500;
    opacity: 0.9;
}

/* ===== MAIN LAYOUT (TOP / BOTTOM) ===== */
#wrap {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 80px);
}

/* EDITOR (TOP) */
#editor {
    width: 100%;
    height: 50%;
    border-bottom: 2px solid #1f2a25;
}

/* PREVIEW (BOTTOM) */
#preview {
    width: 100%;
    height: 50%;
    background: #ffffff;
}

/* ===== FOOTER ===== */
#footer {
    height: 30px;
    background: #2f3f38;
    color: #d6e2dc;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-top: 1px solid #1f2a25;
    opacity: 0.95;
}
</style>
</head>

<body>

<!-- MENUBAR -->
<div id="menubar">
    <div id="left">
        <img src="logo.webp" id="logo">
        <span id="title">Code Editor (HTML/CSS/JS)</span>
    </div>
</div>

<!-- EDITOR + PREVIEW -->
<div id="wrap">
    <div id="editor"></div>
    <div id="preview"></div>
</div>

<!-- FOOTER -->
<div id="footer">
    Built with inspiration from ACE & Asif Mughal
</div>

<!-- ACE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>

<script>
var editor = ace.edit("editor");
editor.setTheme("ace/theme/monokai");
editor.session.setMode("ace/mode/html");

editor.setShowPrintMargin(false);
editor.setValue("", -1);

/* ===== LIVE PREVIEW ===== */
let timeout;

function updatePreview() {
    var code = editor.getValue();
    var preview = document.getElementById("preview");

    preview.innerHTML = "<iframe style='width:100%;height:100%;border:none;'></iframe>";

    var iframe = preview.querySelector("iframe");
    iframe.srcdoc = code;
}

/* debounce (prevents lag) */
editor.session.on("change", function () {
    clearTimeout(timeout);
    timeout = setTimeout(updatePreview, 300);
});

/* resize fix */
window.addEventListener("resize", function () {
    editor.resize();
});

/* init */
setTimeout(() => {
    editor.resize();
}, 100);

updatePreview();
</script>

</body>
</html>
